<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
  </head>
  <body>
    <h1>{{ title }}</h1>
    <form method="post" action="{{ action }}">
      <p>
        <label for="project_key">Проект</label>
        <select id="project_key" name="project_key">
          {{ projects_options }}
        </select>
      </p>
      <p>
        <label for="time">Время</label>
        <input id="time" name="time" type="text" value="{{ time }}">
      </p>
      <button type="submit">Сохранить</button>
    </form>
    <p><a href="/admin/slots">Назад</a></p>
  </body>
</html>
